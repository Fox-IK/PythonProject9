[tool.poetry]
name = "transaction-analyzer"
version = "0.1.0"
description = "Анализатор банковских транзакций"
authors = ["Your Name <your.email@example.com>"]

[tool.poetry.dependencies]
python = "^3.8"
pandas = "^1.5.0"
openpyxl = "^3.0.0"
requests = "^2.28.0"
python-dotenv = "^0.19.0"

[poetry.group.dev.dependencies]
pytest = "^7.0.0"
pytest-cov = "^4.0.0"
flake8 = "^5.0.0"
black = "^22.0.0"
isort = "^5.10.0"
mypy = "^0.991.0"

[tool.black]
line-length = 119
exclude = '''
/(
  \.git
  | __pycache__
)/
'''

[tool.isort]
line_length = 119

[tool.mypy]
disallow_untyped_defs = true
warn_return_any = true
exclude = ['venv/']
